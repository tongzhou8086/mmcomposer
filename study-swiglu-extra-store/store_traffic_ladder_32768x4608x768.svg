<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Store traffic ladder for 32768x4608x768</title>
  <desc id="desc">Line chart of store-only runtime versus final output traffic multiple. Runtime rises from 164.928 us at 0.5x traffic to 212.096 us at 2.0x traffic.</desc>
  <rect width="760" height="420" fill="#ffffff"/>
  <text x="86" y="28" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#111827">Store traffic ladder: 32768x4608x768</text>
  <text x="86" y="50" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4b5563">Stage 1 store-only epilogue, do_bench warmup=1000ms rep=1000ms</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">
    <line x1="86" y1="322" x2="686" y2="322" stroke="#111827" stroke-width="1.2"/>
    <line x1="86" y1="42" x2="86" y2="322" stroke="#111827" stroke-width="1.2"/>

    <g stroke="#e5e7eb" stroke-width="1">
      <line x1="86" y1="42.0" x2="686" y2="42.0"/>
      <line x1="86" y1="92.9" x2="686" y2="92.9"/>
      <line x1="86" y1="169.3" x2="686" y2="169.3"/>
      <line x1="86" y1="245.6" x2="686" y2="245.6"/>
      <line x1="86" y1="322.0" x2="686" y2="322.0"/>
    </g>

    <g text-anchor="end">
      <text x="76" y="46">215</text>
      <text x="76" y="97">205</text>
      <text x="76" y="173">190</text>
      <text x="76" y="250">175</text>
      <text x="76" y="326">160</text>
    </g>

    <g text-anchor="middle">
      <line x1="86" y1="322" x2="86" y2="328" stroke="#111827"/>
      <line x1="286" y1="322" x2="286" y2="328" stroke="#111827"/>
      <line x1="486" y1="322" x2="486" y2="328" stroke="#111827"/>
      <line x1="686" y1="322" x2="686" y2="328" stroke="#111827"/>
      <text x="86" y="346">0.5x</text>
      <text x="286" y="346">1.0x</text>
      <text x="486" y="346">1.5x</text>
      <text x="686" y="346">2.0x</text>
    </g>

    <text x="386" y="386" text-anchor="middle" font-size="13" fill="#111827">Final output traffic multiple</text>
    <text x="20" y="182" transform="rotate(-90 20 182)" text-anchor="middle" font-size="13" fill="#111827">Runtime (us)</text>
  </g>

  <polyline points="86,296.9 286,265.3 486,181.9 686,56.8" fill="none" stroke="#0f766e" stroke-width="3"/>
  <g fill="#0f766e" stroke="#ffffff" stroke-width="2">
    <circle cx="86" cy="296.9" r="5"/>
    <circle cx="286" cy="265.3" r="5"/>
    <circle cx="486" cy="181.9" r="5"/>
    <circle cx="686" cy="56.8" r="5"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">
    <text x="86" y="284" text-anchor="middle">164.928 us</text>
    <text x="286" y="252" text-anchor="middle">171.136 us</text>
    <text x="486" y="169" text-anchor="middle">187.520 us</text>
    <text x="686" y="44" text-anchor="middle">212.096 us</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
    <text x="186" y="276">+6.208 us</text>
    <text x="386" y="218">+16.384 us</text>
    <text x="586" y="108">+24.576 us</text>
  </g>
</svg>
