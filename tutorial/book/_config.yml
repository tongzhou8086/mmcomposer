# Jupyter Book configuration — minimal.  See https://jupyterbook.org for the
# full reference.

title: "Matrix Multiplication Optimization on B200"
author: "Tong Zhou & contributors"
copyright: "2026"
logo: ""

# Build settings.
execute:
  execute_notebooks: "off"     # Tutorial is prose + code-blocks; no live runs.

# Markdown extensions (MyST).
parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - deflist
    - dollarmath
    - linkify
    - substitution
    - tasklist

# HTML output.
html:
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: true

# Repository link — drives the "View source" / "Edit on GitHub" buttons.
repository:
  url: "https://github.com/tongzhou8086/mmcomposer"
  path_to_book: "tutorial/book"
  branch: "master"

# Sphinx config passthrough.
sphinx:
  config:
    html_show_copyright: true
    language: "en"
