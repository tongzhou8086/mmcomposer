# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    # Jupyter Book stores its config in docs/_config.yml + docs/_toc.yml.
    # RTD's standard build path expects a Sphinx conf.py.  This step
    # converts the JB config into a conf.py + index that RTD can build
    # with its normal Sphinx pipeline.
    pre_build:
      - jupyter-book config sphinx tutorial/book/

sphinx:
  configuration: tutorial/book/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: tutorial/book/requirements.txt

formats:
  - htmlzip
